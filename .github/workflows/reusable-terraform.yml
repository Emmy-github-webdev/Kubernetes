name: Reusable Terraform Workflow

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

      tf_action:
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

env:
  TF_VERSION: "1.8.5"
  AWS_REGION: "us-east-1"
  TF_WORKING_DIR: infra/environments/${{ inputs.environment }}

jobs:

  terraform:
    runs-on: ubuntu-latest

    environment:
      name: ${{ inputs.environment }}

    defaults:
      run:
        shell: bash

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      #################################################
      # OIDC AUTHENTICATION
      #################################################

      - name: Check AWS role secret
        run: |
          if [ -z "${{ secrets.AWS_ROLE_ARN }}" ]; then
            echo "ROLE secret is missing"
            exit 1
          fi
          echo "ROLE secret is present"
          
      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      #################################################
      # TERRAFORM BACKEND BOOTSTRAP
      #################################################

      - name: Bootstrap Terraform Backend
        env:
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
        run: |

          ENVIRONMENT="${{ inputs.environment }}"

          BACKEND_KEY="emmy-github-webdev-kubernetes/${ENVIRONMENT}/tfstate.tfstate"

          echo "Backend key: ${BACKEND_KEY}"

          #################################################
          # CREATE S3 BUCKET IF MISSING
          #################################################

          if aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
            echo "S3 bucket exists: $TF_STATE_BUCKET"

          else

            echo "Creating S3 bucket: $TF_STATE_BUCKET"

            aws s3api create-bucket \
              --bucket "$TF_STATE_BUCKET" \
              --region "${{ env.AWS_REGION }}" \
              --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}

            #################################################
            # ENABLE VERSIONING
            #################################################

            aws s3api put-bucket-versioning \
              --bucket "$TF_STATE_BUCKET" \
              --versioning-configuration Status=Enabled

            #################################################
            # ENABLE ENCRYPTION
            #################################################

            run: |
              jq -n '{
                Rules: [
                  {
                    ApplyServerSideEncryptionByDefault: {
                      SSEAlgorithm: "AES256"
                    }
                  }
                ]
              }' > encryption.json

            aws s3api put-bucket-encryption \
              --bucket "$TF_STATE_BUCKET" \
              --server-side-encryption-configuration file://encryption.json

          fi

          #################################################
          # CREATE DYNAMODB LOCK TABLE IF MISSING
          #################################################

          if aws dynamodb describe-table \
            --table-name "$TF_LOCK_TABLE" \
            --region "${{ env.AWS_REGION }}" >/dev/null 2>&1; then

            echo "DynamoDB table exists: $TF_LOCK_TABLE"

          else

            echo "Creating DynamoDB table: $TF_LOCK_TABLE"

            aws dynamodb create-table \
              --table-name "$TF_LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "${{ env.AWS_REGION }}"

          fi

          #################################################
          # GENERATE BACKEND CONFIG
          #################################################

          cat > backend.hcl <<EOF
          bucket         = "${TF_STATE_BUCKET}"
          key            = "${BACKEND_KEY}"
          region         = "${{ env.AWS_REGION }}"
          dynamodb_table = "${TF_LOCK_TABLE}"
          encrypt        = true
          EOF

          echo "Generated backend.hcl"
          cat backend.hcl

      #################################################
      # TERRAFORM SETUP
      #################################################

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
          key: terraform-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}

      - name: Configure Terraform Plugin Cache
        run: |
          mkdir -p ~/.terraform.d/plugin-cache

          echo 'plugin_cache_dir="$HOME/.terraform.d/plugin-cache"' > ~/.terraformrc

      #################################################
      # TERRAFORM INIT
      #################################################

      - name: Terraform Init
        run: | 
          terraform init \ 
          -backend-config=backend.hcl \ 
          -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      #################################################
      # TERRAFORM FMT
      #################################################

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive

      #################################################
      # TERRAFORM VALIDATE
      #################################################

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: ${{ env.TF_WORKING_DIR }}

      #################################################
      # TFLINT
      #################################################

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint
        id: tflint
        continue-on-error: true
        run: tflint --recursive --format compact
        working-directory: ${{ env.TF_WORKING_DIR }}

      #################################################
      # CHECKOV
      #################################################

      - name: Run Checkov Scan
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        continue-on-error: true
        with:
          directory: ${{ env.TF_WORKING_DIR }}
          framework: terraform
          output_format: cli,json
          output_file_path: console,checkov.json
          quiet: true
          soft_fail: true

      #################################################
      # TERRAFORM PLAN
      #################################################

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file=environments/${{ inputs.environment }}/terraform.tfvars \
            -out=tfplan \
            -input=false \
            -no-color

          terraform show -json tfplan > tfplan.json
          terraform show -no-color tfplan > tfplan.txt
          working-directory: ${{ env.TF_WORKING_DIR }}

      #################################################
      # PLAN SUMMARY
      #################################################

      - name: Parse Terraform Plan Summary
        id: plan-summary
        run: |

          ADD=$(jq '[.resource_changes[]?.change.actions?] | flatten | map(select(. == "create")) | length' tfplan.json)

          CHANGE=$(jq '[.resource_changes[]?.change.actions?] | flatten | map(select(. == "update")) | length' tfplan.json)

          DESTROY=$(jq '[.resource_changes[]?.change.actions?] | flatten | map(select(. == "delete")) | length' tfplan.json)

          echo "add=$ADD" >> $GITHUB_OUTPUT
          echo "change=$CHANGE" >> $GITHUB_OUTPUT
          echo "destroy=$DESTROY" >> $GITHUB_OUTPUT

      #################################################
      # CHECKOV SUMMARY
      #################################################

      - name: Parse Checkov Summary
        id: checkov-summary
        run: |

          if [ -f checkov.json ]; then

            PASSED=$(jq '.summary.passed // 0' checkov.json)
            FAILED=$(jq '.summary.failed // 0' checkov.json)
            SKIPPED=$(jq '.summary.skipped // 0' checkov.json)

          else

            PASSED=0
            FAILED=0
            SKIPPED=0

          fi

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT

      #################################################
      # UPLOAD PLAN
      #################################################

      - name: Upload Terraform Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan 
            ${{ env.TF_WORKING_DIR }}/tfplan.json 
            ${{ env.TF_WORKING_DIR }}/tfplan.txt

      #################################################
      # PR COMMENT
      #################################################

      - name: Comment Terraform Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const plan = fs.readFileSync('tfplan.txt', 'utf8');

            const body = `
            ## Terraform Plan - ${{ inputs.environment }}

            ### Terraform Changes

            | Action | Count |
            |---|---|
            | Add | ${{ steps.plan-summary.outputs.add }} |
            | Change | ${{ steps.plan-summary.outputs.change }} |
            | Destroy | ${{ steps.plan-summary.outputs.destroy }} |

            ### Checkov Summary

            | Result | Count |
            |---|---|
            | Passed | ${{ steps.checkov-summary.outputs.passed }} |
            | Failed | ${{ steps.checkov-summary.outputs.failed }} |
            | Skipped | ${{ steps.checkov-summary.outputs.skipped }} |

            <details>
            <summary>Terraform Plan</summary>

            \`\`\`terraform
            ${plan.substring(0, 60000)}
            \`\`\`

            </details>
            `;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(comment =>
              comment.body.includes('## Terraform Plan')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      #################################################
      # APPLY / DESTROY
      #################################################

      - name: Download Terraform Plan
        if: |
          github.ref == 'refs/heads/develop' ||
          github.ref == 'refs/heads/staging' ||
          github.ref == 'refs/heads/main' ||
          github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        if: |
          (
            github.ref == 'refs/heads/develop' ||
            github.ref == 'refs/heads/staging' ||
            github.ref == 'refs/heads/main' ||
            github.event_name == 'workflow_dispatch'
          ) &&
          inputs.tf_action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: |
          github.event_name == 'workflow_dispatch' &&
          inputs.tf_action == 'destroy'
        run: |
          terraform destroy \
            -auto-approve \
        working-directory: ${{ env.TF_WORKING_DIR }}