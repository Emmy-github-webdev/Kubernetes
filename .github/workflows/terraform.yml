name: Terraform CI/CD

on:
  push:
    branches:
      - develop
      - staging
      - main
      - 'feature/**'

  pull_request:
    branches:
      - staging
      - main

  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

################################################# 
# REQUIRED FOR REUSABLE WORKFLOW 
################################################# 
permissions: 
  id-token: write 
  contents: read 
  pull-requests: write 
  security-events: write

jobs:

  determine-env:
    runs-on: ubuntu-latest

    outputs:
      environment: ${{ steps.setenv.outputs.environment }}
      tf_action: ${{ steps.setenv.outputs.tf_action }}

    steps:
      - id: setenv
        run: |

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "tf_action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          BRANCH="${GITHUB_REF#refs/heads/}"

          if [[ "$BRANCH" == "develop" ]]; then
            echo "environment=dev" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == "staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT

          elif [[ "$BRANCH" == "main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT

          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

          echo "tf_action=apply" >> $GITHUB_OUTPUT

  terraform:
    needs: determine-env

    uses: ./.github/workflows/reusable-terraform.yml

    with:
      environment: ${{ needs.determine-env.outputs.environment }}
      tf_action: ${{ needs.determine-env.outputs.tf_action }}

    secrets: inherit